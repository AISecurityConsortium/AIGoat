# ─────────────────────────────────────────────────────────────────────
# AI Goat — Attack Lab Definitions
# ─────────────────────────────────────────────────────────────────────
#
# This file defines the attack labs available in the platform. Each lab
# maps to an OWASP Top 10 for LLM Applications category and provides
# a guided exercise for a specific vulnerability type.
#
# The backend reads this file at startup via app/core/lab_loader.py.
# The frontend AttacksPage uses its own hardcoded LABS object for
# display, but the backend uses these definitions for lab session
# tracking and prompt loading.
#
# ── Field Reference ──────────────────────────────────────────────────
#
#   id                  Unique lab identifier (e.g. "llm01-1").
#                       Convention: <owasp>-<sequence> for multi-lab categories.
#
#   name                Human-readable lab name shown in the UI.
#
#   owasp               OWASP LLM Top 10 category code (e.g. "LLM01").
#
#   status              "active" — lab is available and functional.
#                       "coming_soon" — placeholder, not yet implemented.
#
#   defense_override    Defense level forced when this lab is active.
#                       0 = Vulnerable (no defenses, recommended for labs).
#                       Set to null to use the user's current defense level.
#
#   prompt_file         Name of the system prompt file in prompts/labs/.
#                       The backend loads prompts/labs/<prompt_file>.md.
#                       Set to null if the lab uses the default system prompt.
#
#   challenge_evaluator Name of the challenge evaluator to use (matches
#                       evaluator titles in app/challenges/evaluators/).
#                       Set to null if no automated evaluation is needed.
#
#   description         Short description of what the lab teaches.
#
# ── How to Add a New Lab ─────────────────────────────────────────────
#
#   1. Add an entry below with a unique id and fill in all fields.
#   2. Create a prompt file at prompts/labs/<prompt_file>.md if needed.
#   3. Update the LABS object in frontend/src/components/AttacksPage.jsx
#      with matching goals, example prompts, and expected results.
#   4. Restart the backend to pick up the changes.
#
# ── Adjusting Difficulty ─────────────────────────────────────────────
#
#   - Set defense_override: 0 for beginner labs (no defenses).
#   - Set defense_override: null to let users choose their own level.
#   - Pair with a harder challenge_evaluator for advanced labs.
#   - The prompt file content controls how much the chatbot resists.
#
# ─────────────────────────────────────────────────────────────────────

labs:
  # ── LLM01: Prompt Injection ──────────────────────────────────────
