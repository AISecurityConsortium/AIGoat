# ─────────────────────────────────────────────────────────────
# Docker Desktop must have at least 12 GB RAM allocated.
# Mistral 7B needs ~4.5 GB, plus ~3 GB for the backend.
#   Docker Desktop → Settings → Resources → Memory → 12 GB+
#
# To use a smaller model, change ollama.model in docker/config.yml
# (e.g. "tinyllama") -- the backend pulls the model automatically
# on first startup if it is not already present.
#
# VOLUMES
#   ollama_models  – external volume; survives "docker-compose down -v"
#                    so the ~4.5 GB model is only downloaded once.
#                    Create it before first run:
#                      docker volume create ollama_models
#                    To truly delete:  docker volume rm ollama_models
#
#   db_data        – app database; cleared by "docker-compose down -v"
#                    for a fresh start (re-seeds on next startup).
# ─────────────────────────────────────────────────────────────

name: aigoat

services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./config.yml:/app/config/config.yml
      - ../prompts:/app/prompts
      - ../media:/app/media
      - ../guardrails:/app/guardrails
      - db_data:/app/data
    environment:
      - CONFIG_PATH=/app/config/config.yml
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/products/', timeout=5).raise_for_status()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  ollama_models:
    external: true
